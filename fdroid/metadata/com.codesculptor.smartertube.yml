Name: SmarterTube
Summary: Phone & tablet companion build of SmartTube

Description: |-
  SmarterTube is an Android phone/tablet companion build of SmartTube. It adds a
  portrait, touch-first interface — drawer navigation, search, channel pages,
  portrait playback and Shorts, in-app comments and sign-in — on top of the
  upstream SmartTube YouTube-client engine.

  It is a companion to SmartTube, not a replacement: for Android TV boxes and
  sticks install upstream SmartTube. SmarterTube installs alongside the TV build
  (package com.codesculptor.smartertube) and the two do not conflict.

  Engine features inherited from upstream include SponsorBlock, Return YouTube
  Dislike, DeArrow, adjustable playback speed, up to 8K/60fps/HDR, no ads, and no
  Google Play Services requirement.

  This is an independent fork with no affiliation to Google/YouTube. It depends on
  the non-free YouTube network service (hence the NonFreeNet anti-feature).

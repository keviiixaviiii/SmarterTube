name: Upstream sync

# Daily detection of new upstream commits in yuliskov/SmartTube.
# Behaviour:
#   - If upstream/master is mergeable into master with no conflicts, push a
#     branch `upstream-sync/<date>` and open a PR.
#   - If a merge would conflict, open an issue listing the conflicting paths
#     so a human can resolve them with the rebase runbook in hand.
#   - If master is already up to date with upstream, do nothing.
#
# The actual merge stays a human decision — this workflow only does detection
# and PR/issue creation. See docs/upstream-merge.md for the manual steps.

on:
  schedule:
    - cron: '17 6 * * *'  # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/yuliskov/SmartTube.git
          git fetch upstream master --tags

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Skip if an upstream-sync PR or issue is already open
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --label upstream-sync --state open --json number --jq 'length')
          OPEN_ISSUES=$(gh issue list --label upstream-sync --state open --json number --jq 'length')
          OPEN=$((OPEN_PRS + OPEN_ISSUES))
          echo "open_items=$OPEN" >> $GITHUB_OUTPUT
          if [ "$OPEN" != "0" ]; then
            echo "An upstream-sync PR or issue is already open ($OPEN_PRS PR(s), $OPEN_ISSUES issue(s)) — skipping this run."
          fi

      - name: Check for upstream commits
        id: check
        if: steps.existing.outputs.open_items == '0'
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          MERGE_BASE=$(git merge-base master upstream/master)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" = "$MERGE_BASE" ]; then
            echo "Up to date with upstream — nothing to do."
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          else
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            COMMITS=$(git log --oneline "$MERGE_BASE..upstream/master" | head -20)
            echo "$COMMITS" > /tmp/upstream-commits.txt
            echo "## New upstream commits since last merge" > /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md
            echo '```' >> /tmp/pr-body.md
            cat /tmp/upstream-commits.txt >> /tmp/pr-body.md
            echo '```' >> /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md
            UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/master 2>/dev/null || echo "")
            if [ -n "$UPSTREAM_TAG" ]; then
              echo "Latest upstream tag: \`$UPSTREAM_TAG\`" >> /tmp/pr-body.md
              echo "" >> /tmp/pr-body.md
            fi
          fi

      - name: Skip — up to date
        if: steps.check.outputs.needs_sync == 'false'
        run: echo "Done."

      - name: Attempt merge into a sync branch
        if: steps.check.outputs.needs_sync == 'true'
        id: merge
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="upstream-sync/$DATE"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -B "$BRANCH" master
          if git merge --no-ff --no-commit upstream/master; then
            git commit -m "Merge upstream/master into $BRANCH"
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "$CONFLICTS" > /tmp/conflicts.txt
            git merge --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Push sync branch (clean merge)
        if: steps.check.outputs.needs_sync == 'true' && steps.merge.outputs.status == 'clean'
        run: |
          git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open PR (clean merge)
        if: steps.check.outputs.needs_sync == 'true' && steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "Automatic merge of upstream/master into master — clean, no conflicts."
            echo ""
            cat /tmp/pr-body.md
            echo ""
            echo "## Before merging"
            echo ""
            echo "Confirm the 3 integration points are intact (see [docs/upstream-merge.md](../blob/master/docs/upstream-merge.md))."
            echo "The \`stmobile-validate\` workflow will run on this PR and check them automatically."
            echo ""
            echo "_Generated by .github/workflows/upstream-sync.yml_"
          } > /tmp/pr-final.md
          # Create the PR without --label (gh's client-side label lookup fails under
          # the scoped GITHUB_TOKEN), then apply the label via the REST API.
          PR_URL=$(gh pr create \
            --base master \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "Upstream sync $(date -u +%Y-%m-%d) — clean merge" \
            --body-file /tmp/pr-final.md)
          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh api "repos/${{ github.repository }}/issues/$PR_NUM/labels" \
            -f 'labels[]=upstream-sync'

      - name: Open issue (conflict)
        if: steps.check.outputs.needs_sync == 'true' && steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "An automatic merge of \`upstream/master\` conflicts with this fork's \`master\`."
            echo ""
            cat /tmp/pr-body.md
            echo ""
            echo "## Conflicting paths"
            echo ""
            echo '```'
            cat /tmp/conflicts.txt
            echo '```'
            echo ""
            echo "## Next steps"
            echo ""
            echo "Follow [docs/upstream-merge.md](../blob/master/docs/upstream-merge.md) for manual resolution. The 3 integration points from the rebase runbook (\`stmobile\` flavor block in \`smarttubetv/build.gradle\` and \`common/build.gradle\`, plus the \`protected setupViewManager\` widening in \`MainApplication\`) are the most likely conflict surfaces."
            echo ""
            echo "_Generated by .github/workflows/upstream-sync.yml_"
          } > /tmp/issue-body.md
          # Use the REST API directly — gh issue create --label does a client-side
          # label lookup that fails under the scoped GITHUB_TOKEN.
          gh api "repos/${{ github.repository }}/issues" \
            -f title="Upstream sync $(date -u +%Y-%m-%d) — manual merge needed" \
            -F body=@/tmp/issue-body.md \
            -f 'labels[]=upstream-sync' \
            -f 'labels[]=conflict'

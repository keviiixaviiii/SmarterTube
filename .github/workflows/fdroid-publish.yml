name: Publish F-Droid repo

# Regenerates SmarterTube's self-hosted F-Droid repository index from the APKs
# attached to GitHub Releases and deploys it to GitHub Pages.
#
# It serves OUR already-signed APKs as-is (F-Droid does not re-sign), so an F-Droid
# install upgrades in place over a GitHub/Obtainium install. Only the repo INDEX is
# signed here, with the repo-index key from secrets — the APK signing key never
# enters CI. See fdroid/README.md for the one-time bootstrap.

on:
  release:
    types: [published]   # fires right after release.ps1 publishes a release
  workflow_dispatch:      # manual re-run / first-time smoke test

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; don't cancel a running publish.
concurrency:
  group: fdroid-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver apksigner
          fdroid --version

      - name: Restore repo-index signing keystore
        env:
          FDROID_KEYSTORE_P12_BASE64: ${{ secrets.FDROID_KEYSTORE_P12_BASE64 }}
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
        run: |
          if [ -z "$FDROID_KEYSTORE_P12_BASE64" ]; then
            echo "::error::FDROID_KEYSTORE_P12_BASE64 secret is not set — run the bootstrap (fdroid/README.md)."
            exit 1
          fi
          echo "$FDROID_KEYSTORE_P12_BASE64" | base64 -d > fdroid/keystore.p12
          # Append the secret passwords to the committed (password-free) config.yml.
          {
            echo "keystorepass: \"$FDROID_KEYSTORE_PASS\""
            echo "keypass: \"$FDROID_KEY_PASS\""
          } >> fdroid/config.yml

      - name: Download release APKs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p fdroid/repo
          # Pull the APKs from the most recent releases so the index keeps a little
          # version history. The triggering release is included; --skip-existing
          # avoids re-downloading. F-Droid handles the per-ABI splits per device.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 4 --json tagName --jq '.[].tagName' \
            | while read -r tag; do
                echo "Downloading APKs for $tag"
                gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
                  --pattern '*.apk' --dir fdroid/repo --skip-existing || true
              done
          echo "APKs present:"; ls -1 fdroid/repo/*.apk || (echo "::error::no APKs downloaded"; exit 1)

      - name: Build & sign repo index
        run: |
          cd fdroid
          fdroid update --pretty --create-metadata
          fdroid lint || true

      - name: Assemble Pages site (repo/ + archive/ only — never config/keystore)
        run: |
          mkdir -p _site/fdroid
          cp -r fdroid/repo _site/fdroid/repo
          [ -d fdroid/archive ] && cp -r fdroid/archive _site/fdroid/archive || true
          # Safety: ensure no secrets leaked into the published artifact.
          if find _site -name 'keystore.p12' -o -name 'config.yml' | grep -q .; then
            echo "::error::secret file found in Pages artifact — aborting"; exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

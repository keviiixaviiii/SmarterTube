name: stmobile validate

# Validates that the phone-fork-specific integration points are intact and the
# stmobile flavor still builds. Runs on every PR against master (especially
# upstream-sync PRs, where it's the human-judgment safety net).
#
# Three integration points checked (from rebase_runbook):
#   1. smarttubetv/build.gradle — stmobile product flavor with .mobile suffix
#   2. common/build.gradle      — stmobile flavor with ststable matchingFallbacks
#   3. MainApplication.java     — protected setupViewManager (widened from private)

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Verify integration point 1 — smarttubetv/build.gradle
        run: |
          # Tolerate both 'matchingFallbacks [...]' and 'matchingFallbacks = [...]'
          # (smarttubetv/build.gradle uses the '=' assignment form).
          grep -E 'applicationId\s+"com\.codesculptor\.smartertube"' smarttubetv/build.gradle
          grep -E "matchingFallbacks\s*=?\s*\['ststable'\]" smarttubetv/build.gradle
          echo "OK: stmobile flavor present with com.codesculptor.smartertube id and ststable fallback"

      - name: Verify integration point 2 — common/build.gradle
        run: |
          # The stmobile flavor block in common/build.gradle uses '=' for the
          # matchingFallbacks assignment; tolerate either form.
          grep -E 'stmobile\s*\{' common/build.gradle
          grep -E "matchingFallbacks\s*=?\s*\['ststable'\]" common/build.gradle
          echo "OK: stmobile flavor present in common/build.gradle"

      - name: Verify integration point 3 — MainApplication.setupViewManager
        run: |
          # The phone port widens this from private to protected so MobileApplication
          # can override it. If upstream narrows it again the override breaks silently.
          grep -E 'protected\s+void\s+setupViewManager' \
            smarttubetv/src/main/java/com/liskovsoft/smartyoutubetv2/tv/ui/main/MainApplication.java
          echo "OK: setupViewManager is protected"

      - name: Build stmobile debug APK
        run: |
          chmod +x gradlew
          ./gradlew :smarttubetv:assembleStmobileDebug --no-daemon

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: stmobile-debug-apks
          path: smarttubetv/build/outputs/apk/stmobile/debug/*.apk
          if-no-files-found: error
